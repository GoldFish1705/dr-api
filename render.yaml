services:
  - type: web
    name: dr-detection-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: MODEL_PATH
        value: model_dr.onnx
    disk:
      name: model-storage
      mountPath: /opt/render/project/src
      sizeGB: 1
